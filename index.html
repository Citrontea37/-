<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#336699">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항생제 용량 추천 도구 VER 1.0 (모바일 지원)</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
    <style>
        :root {
            --primary-bg: #eaf1f8;
            --container-bg: #ffffff;
            --accent-blue: #336699;
            --accent-light: #e0f7fa;
            --border-color: #cfd8dc;
            --text-main: #2c3e50;
            --warning-bg: #fffbe6;
            --warning-border: #ffc107;
            --result-bg: #ecf9ff;
            --result-border: #00bcd4;
        }

        body { font-family: 'Pretendard', sans-serif; font-size: 13px; background: var(--primary-bg); margin: 0; padding: 15px; color: var(--text-main); }
        .container { max-width: 800px; margin: 0 auto; background: var(--container-bg); border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--accent-blue); margin-bottom: 5px; font-weight: 800; font-size: 1.4rem; }
        .version-tag { text-align: center; font-size: 11px; color: #78909c; margin-bottom: 20px; }
        .notice-banner { background-color: #f1f4f9; border-left: 4px solid var(--accent-blue); padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 12px; line-height: 1.4; }
        
        /* 기본 PC 레이아웃 (2단 그리드) */
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: 600; color: #455a64; font-size: 12px; }
        input, select { padding: 10px 8px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 14px; outline-color: var(--accent-blue); box-sizing: border-box; width: 100%; }
        
        #drug-input { 
            background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 12px;
            padding-right: 30px;
        }

        .button-group { display: flex; gap: 8px; margin-bottom: 15px; }
        button { flex: 1; background: linear-gradient(135deg, #aabbee, #6a85c1); color: white; border: none; padding: 14px; font-size: 14px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        #result-area { margin-top: 15px; display: none; }
        .card { border-radius: 10px; padding: 15px; margin-bottom: 10px; line-height: 1.5; white-space: pre-line; word-break: keep-all;}
        .bmi-card { background: var(--warning-bg); border: 1.5px solid var(--warning-border); font-size: 12.5px; }
        .dose-card { background: var(--result-bg); border: 1.5px solid var(--result-border); font-weight: 500; font-size: 13px; }
        .comment-card { background: #f8f9fa; border: 1.5px solid #cfd8dc; font-size: 12px; color: #546e7a; }
        .label-tag { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 6px; }
        .tag-bmi { background: #ffecb3; color: #856404; }
        .tag-dose { background: #b2ebf2; color: #006064; }
        .tag-cmt { background: #eceff1; color: #455a64; }
        .wt-highlight { color: #d32f2f; font-weight: bold; }

        /* 모바일 최적화를 위한 미디어 쿼리 (화면 너비 600px 이하일 때 적용) */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.2rem; }
            
            /* 입력창을 1열로 변경하여 터치와 시인성을 높임 */
            .input-grid {
                grid-template-columns: 1fr; 
                gap: 15px;
            }
            
            /* 모바일에서 버튼 터치 영역 확보 */
            input, select {
                font-size: 15px;
                padding: 12px 10px;
            }
            button {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💊 항생제 용량 추천 도구</h1>

                <option value="Ceftizoxime">
                <option value="Ceftolozane/tazobactam (Zerbaxa)">

                <option value="Methylolcefalexin">
                <option value="Moxifloxacin">
                <option value="Nafcillin">
                <option value="Piperacillin/Tazobactam">
                <option value="Sulfamethoxazole/Trimethoprim">
                <option value="Teicoplanin">
                <option value="Tigecycline">
                <option value="Vancomycin IV">
                <option value="Vancomycin PO">
                <option value="Acyclovir IV">
                <option value="Acyclovir PO">
                <option value="Amphotericin B liposomal (Ambisome)">
                <option value="Amphotericin B (Fungizone)">
                <option value="Anidulafungin">
                <option value="Caspofungin">
                <option value="Cidofovir">
                <option value="Fluconazole IV">
                <option value="Fluconazole PO">
                <option value="Ganciclovir">
                <option value="Letermovir">
                <option value="Oseltamivir PO">
                <option value="Peramivir IV">
                <option value="Posaconazole">
                <option value="Valacyclovir PO">
                <option value="Valganciclovir PO">
                <option value="Voriconazole IV">
                <option value="Voriconazole PO">
            </datalist>
        </div>
        <div class="form-group">
            <label>성별</label>
            <select id="gender"><option value="male">남성</option><option value="female">여성</option></select>
        </div>
        <div class="form-group">
            <label>신장 (cm)</label>
            <input type="number" id="height" placeholder="예: 170 (선택)" step="0.1">
        </div>
        <div class="form-group"><label>체중 (kg)</label><input type="number" id="weight" placeholder="예: 70" step="0.1"></div>
        <div class="form-group"><label>eGFR (mL/min) *CG 기준*</label><input type="number" id="egfr" placeholder="예: 60"></div>
        <div class="form-group">
            <label>투석 여부</label>
            <select id="dialysis">
                <option value="none">해당 없음</option>
                <option value="IHD">간헐적 투석 (IHD)</option>
                <option value="CVVHDF">지속적 투석 (CVVHDF)</option>
            </select>
        </div>
    </div>

    <div class="button-group">
        <button onclick="run()">🧪 추천 용량 확인</button>
        <button onclick="resetAll()" style="background: #eceff1; color: #2c3e50; flex: 0.4;">🔄 초기화</button>
    </div>

    <div id="result-area">
        <div id="bmi-box" class="card bmi-card"></div>
        <div id="dose-box" class="card dose-card"></div>
        <div id="comment-box" class="card comment-card"></div>
    </div>
</div>

    peramivir: { name: "Peramivir IV", ranges: [{min:50, dose:"[경증] 600mg q 24h 1회\n[중증] 600mg q 24h 최대 5일 (Ref. uptodate)"}, {min:30, max:50, dose:"[경증] 200mg q 24h 1회\n[중증] 150mg q 24h 최대 5일 (Ref. uptodate)"}, {min:10, max:30, dose:"[경증] 100mg q 24h 1회\n[중증] 100mg q 24h 최대 5일 (Ref. uptodate)"}, {max:10, dose:"[경증] 100mg q 24h 1회\n[중증] D1 100mg q 24h → D2- 15mg q 24h (Ref. uptodate)"}], IHD: "[경증] 100mg q 24h 1회 투석 날 투석 후 투여\n[중증] D1 100mg q 24h → D2- 100mg q 24h 투석 2시간 후 투여 (Ref. uptodate)", cmt: "" },
    posaconazole: { name: "Posaconazole", ranges: [{min: 0, dose: "[Prophylaxis] 300mg q 12h for 2 doses → 300mg q 24h (Ref. uptodate)"}], IHD: "[Prophylaxis] 300mg q 12h for 2 doses → 300mg q 24h (Ref. uptodate)", cmt: "Syrup은 식사와 함께" },
    valacyclovir_po: { name: "Valacyclovir PO", ranges: [{min: 50, dose: "[HSV] 1g q 12h (Ref. uptodate)\n[HSV meningitis/Zoster] 1g q 8h (Ref. uptodate)"}, {min: 30, max: 50, dose: "[HSV] 1g q 12h (Ref. uptodate)\n[HSV meningitis/Zoster] 1g q 12h (Ref. uptodate)"}, {min: 10, max: 30, dose: "[HSV] 1g q 24h (Ref. uptodate)\n[HSV meningitis/Zoster] 1g q 24h (Ref. uptodate)"}, {min: 0, max: 10, dose: "[HSV] 500mg q 24h (Ref. uptodate)\n[HSV meningitis/Zoster] 500mg q 24h (Ref. uptodate)"}], IHD: "[HSV] 500mg q 24h (Ref. uptodate)\n[HSV meningitis/Zoster] 500mg q 24h 투석 후 투여 (Ref. uptodate)", CVVHDF: "500-1000mg q 12-24h (Ref. uptodate)", cmt: "1. Bell palsy, new onset: 1g q 8h for 7 days in combination with corticosteroids (Ref. uptodate)" },
    valganciclovir: { name: "Valganciclovir PO", ranges: [{min: 60, dose: "[Treatment induction/Preemptive] 900mg q 12h (Ref. uptodate)\n[Treatment maintenance/Prophylaxis] 900mg q 24h (Ref. uptodate)"}, {min: 40, max: 60, dose: "[Treatment induction/Preemptive] 450mg q 12h (Ref. uptodate)\n[Treatment maintenance/Prophylaxis] 450mg q 24h (Ref. uptodate)"}, {min: 25, max: 40, dose: "[Treatment induction/Preemptive] 450mg q 24h (Ref. uptodate)\n[Maintenance/Prophylaxis] 450mg q 48h (Ref. uptodate)"}, {min: 10, max: 25, dose: "[Treatment induction/Preemptive] 450mg 격일 (Ref. uptodate)\n[Treatment maintenance/Prophylaxis] 450mg 주 2회 (Ref. uptodate)"}, {max: 10, dose: "[Treatment induction/Preemptive] Oral solution 200mg 주 3회 투석 후 투여 or Tablet 450mg 주 3회 투석 후 투여 (Ref. uptodate)\n[Treatment maintenance/Prophylaxis] Oral solution 100mg 주 3회 투석 후 투여 or Tablet 450mg 주 2회 (Ref. uptodate)"}], IHD: "[Treatment induction/Preemptive] Oral solution 200mg 주 3회 투석 후 투여 or Tablet 450mg 주 3회 투석 후 투여 (Ref. uptodate)\n[Treatment maintenance/Prophylaxis] Oral solution 100mg 주 3회 투석 후 투여 or Tablet 450mg 주 2회 (Ref. uptodate)", cmt: "1. Preemptive: CMV PCR + → 900 mg twice daily until viral load undetectable\n2. Prophylaxis: 고위험군 (CMV Donor +/Recipient -)" },

    voriconazole_po: { name: "Voriconazole PO (Ref. uptodate)", ranges: [{min: 0, dose: "200-300mg q 12h or 3-4mg/kg q 12h"}], IHD: "200-300mg q 12h or 3-4mg/kg q 12h", CVVHDF: "200-300mg q 12h or 3-4mg/kg q 12h", cmt: "1. eGFR < 50 시 IV 제형 부형제 독성 주의\n2. 혈중농도 모니터링 필요 (주 1회) Target trough: 1.0-5.5mcg/mL\n3. 약물상호작용 주의 필요" }
};

function run() {
    const gender = document.getElementById('gender').value;
    const hInput = document.getElementById('height').value;
    const wInput = document.getElementById('weight').value;
    const egfrInput = document.getElementById('egfr').value;
    const dialysis = document.getElementById('dialysis').value;
    
    const drugInputName = document.getElementById('drug-input').value; 
    const drugKey = Object.keys(DB).find(key => DB[key].name === drugInputName);
    const drug = DB[drugKey];

    if (!drug) { 
        alert("목록에서 정확한 약물 이름을 선택하거나 입력해주세요."); 
        return; 
    }

    if (!wInput || isNaN(parseFloat(egfrInput))) { 
        alert("체중과 eGFR 수치를 입력해주세요."); 
        return; 
    }

    const w = parseFloat(wInput);
    const egfr = parseFloat(egfrInput);
    const hasHeight = hInput.trim() !== ""; 
    
    let targetWt = w, wtStr = "실제체중";
    let bmiTextHTML = "";
    
    const actualWtDrugs = ['vancomycin', 'vancomycin_po', 'teicoplanin', 'voriconazole_po', 'fluconazole_iv', 'fluconazole_po', 'linezolid'];
    const bmi40Drugs = ['acyclovir', 'acyclovir_po', 'ganciclovir'];
    const fixedDoseDrugs = ['tigecycline'];

    if (hasHeight) {
        const h = parseFloat(hInput) / 100;
        const bmi = (w / (h * h)).toFixed(1);
        const ibw = gender === 'male' ? (h * h * 22) : (h * h * 21);
        const adjBw = ibw + 0.4 * (w - ibw);

        if (fixedDoseDrugs.includes(drugKey)) { 
            wtStr = "Fixed Dose"; targetWt = "-"; 
        } else if (actualWtDrugs.includes(drugKey)) { 
            targetWt = w; wtStr = "실제체중"; 
        } else if (bmi40Drugs.includes(drugKey)) {
            if (bmi >= 40) { targetWt = adjBw; wtStr = "보정체중"; }
            else { targetWt = ibw; wtStr = "표준체중"; }
        } else {
            if (bmi >= 25) { targetWt = adjBw; wtStr = "보정체중"; }
        }
        
        bmiTextHTML = `BMI: <strong>${bmi}</strong> / 적용: <span class="wt-highlight">[${wtStr}]</span>${targetWt !== "-" ? ` (${Math.round(targetWt*10)/10}kg)` : ""}`;
    } else {
        if (fixedDoseDrugs.includes(drugKey)) {
            wtStr = "Fixed Dose"; targetWt = "-"; 
            bmiTextHTML = `키 미입력 / 적용: <span class="wt-highlight">[${wtStr}]</span>`;
        } else {
            targetWt = w; 
            wtStr = "입력체중 (키 미적용)"; 
            bmiTextHTML = `<span style="color: #d32f2f; font-size: 11.5px; font-weight: 600;">※ 키가 입력되지 않아 입력된 체중으로 계산합니다. 보정체중 등 정확한 용량 계산이 필요하다면 키를 입력해주세요.</span><br>적용: <span class="wt-highlight">[${wtStr}]</span> (${Math.round(targetWt*10)/10}kg)`;
        }
    }

    document.getElementById('bmi-box').innerHTML = `<span class="label-tag tag-bmi">체중 기준</span><br>${bmiTextHTML}`;

    let rec = "";
    if (dialysis === "IHD") rec = drug.IHD || "데이터 없음";
    else if (dialysis === "CVVHDF") rec = drug.CVVHDF || "데이터 없음";
    else {
        for (const r of drug.ranges) {
            if (egfr >= r.min && (r.max === undefined || egfr <= r.max)) { rec = r.dose; break; }
        }
    }

    let displayRec = rec;

// 2. 바크림(Bactrim) 전용: 4가지 적응증별 하루 총 용량 계산기
    if (drugKey === 'sulfamethoxazole_trimethoprim' && targetWt !== "-") {
        const calcDay = (mg) => ((mg * targetWt) / 80).toFixed(1);

        displayRec = `
            <div style="margin-top: -5px; font-size: 12px; color: #d32f2f; font-weight: 700; padding: 2px;">
                ※ 정상 신기능에 해당하는 용량입니다. 신기능에 따라 아래와 같이 직접 감량하시기 바랍니다.
                eGFR 15~30: 50% 감량 / eGFR < 15 & iHD: 25~50% 감량 / CVVHDF: renal dosing 필요 없음
            </div>
            <table style="width: 100%; font-size: 11.5px; border-collapse: collapse; text-align: left;">
                <tr>
                    <th style="padding: 2px 5px; color: #546e7a;">적응증별 상용량</th>
                    <th style="padding: 2px 5px; color: #546e7a; text-align: right;">Daily dose</th>
                </tr>
                <tr>
                    <td style="padding: 2px 5px;">• [PCP 치료] 15~20mg/kg/day (TMP 기준) q 6-8h</td>
                    <td style="padding: 2px 5px; text-align: right; color: #d32f2f; font-weight: bold;">약 ${calcDay(15)} ~ ${calcDay(20)} amp/정</td>
                </tr>
                <tr>
                    <td style="padding: 2px 5px;">• [PCP 예방] 1 tab/amp q 24h</td>
                    <td style="padding: 2px 5px; text-align: right; color: #d32f2f; font-weight: bold;">1 amp/정</td>
                </tr>
                <tr>
                    <td style="padding: 2px 5px;">• [S.maltophilia] 8~12mg/kg/day (TMP 기준) q 8-12h</td>
                    <td style="padding: 2px 5px; text-align: right; color: #d32f2f; font-weight: bold;">약 ${calcDay(8)} ~ ${calcDay(12)} amp/정</td>
                </tr>
                <tr>
                    <td style="padding: 2px 5px;">• [UTI] 2 tab/amp q 12h</td>
                    <td style="padding: 2px 5px; text-align: right; color: #d32f2f; font-weight: bold;">2.0 amp/정</td>
                </tr>
            </table>          
        </div>`;
    }
    else if (targetWt !== "-" && rec.includes("mg/kg")) {
        displayRec = rec.replace(/([\d.-]+)\s*mg\/kg/g, (match, p1) => {
           const calculated = p1.split(/[-]/).map(val => {
               const num = parseFloat(val);
               return isNaN(num) ? val : Math.round(num * targetWt);
           }).join('-');
           return `${match} <span style="color: #336699; font-weight: 700;">(= ${calculated}mg)</span>`;
        });
    }

    document.getElementById('dose-box').innerHTML = `<span class="label-tag tag-dose">RECOMMENDED DOSE</span><br><strong>${drug.name}</strong>${drugKey === 'sulfamethoxazole_trimethoprim' ? '' : '<br>'}<span style="${drugKey === 'sulfamethoxazole_trimethoprim' ? '' : 'color:#d32f2f;'}">${displayRec || "확인 불가"}</span>`;
    document.getElementById('comment-box').innerHTML = `<span class="label-tag tag-cmt">CLINICAL COMMENTS</span><br>${drug.cmt || "특이사항 없음"}`;
    document.getElementById('result-area').style.display = "block";
}

function resetAll() {
    document.querySelectorAll('input').forEach(i => i.value = '');
    document.getElementById('result-area').style.display = 'none';
}
</script>
